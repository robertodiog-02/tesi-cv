# =============================================================
# ABLATION 1 — POSA SENZA TESTA (naso, occhi, orecchie rimossi)
# =============================================================
# Rimuove i 5 nodi testa (indici 0-4): naso, occhi, orecchie.
# Il giunto piu' alto rimasto e' il Neck -> scheletro a 14 giunti.
#
# Note tecniche:
#  - Neck e CHip restano (derivati da spalle/anche, che NON sono testa).
#  - La reference-point normalization usa le spalle (d_s) o l'altezza bbox:
#    tutto disponibile -> nessun impatto sulla normalizzazione.
#  - Il drop avviene DOPO derivazione + normalizzazione (vedi
#    pie_dataset._get_pose -> pose_preproc.drop_head_joints).
#  - L'encoder GCN adatta automaticamente l'edge_index a 14 nodi.
#
# Unica differenza vs baseline: streams.pose.exclude_head = true
# =============================================================

experiment:
  name: pedgt_pie_ablation1_no_head
  seed: 42

data:
  annotation_root: /Users/robertodioguardi/Desktop/PIE
  obs_len: 16
  overlap: 0.6
  overlap_eval: 0.6
  anchor_eval: true
  endpoint_step: 6
  pose_dir: data/poses
  crop_dir: data/crops
  pose_norm: hip_reference_seq

model:
  name: PedGT
  in_channels: 5
  d_model: 128
  gcn_hidden: 64
  spatial_out: 64
  n_heads: 4
  n_layers: 2
  dim_feedforward: 256
  dropout: 0.7
  encoder_dropout: 0.1
  causal: false

streams:
  pose:
    enabled: true
    use_center_channels: true
    exclude_head: true          # <<< PROVA 1: rimuove i 5 nodi testa (-> 14 giunti)
    encoder: gcn                # invariato rispetto al baseline
    input_proj: [16]
    input_proj_dropout: 0.0

  kinematics:
    enabled: false
    bbox_format: xyxy
    hidden: 128

  crop:
    enabled: false
    in_dim: 768
    hidden: 128

  fusion: late_fusion

training:
  epochs: 100
  batch_size: 64
  lr: 1.0e-5
  weight_decay: 5.0e-5
  patience: 20
  grad_clip: 3.5
  scheduler: cosine
  plateau_factor: 0.5
  plateau_patience: 5

output:
  checkpoint_dir: checkpoints
  log_dir: logs
