# =============================================================
# ABLATION 8 — SMOOTHING TEMPORALE DEI KEYPOINT (anti-jitter)
# =============================================================
# Filtra temporalmente le coordinate (x,y) dei keypoint per smorzare il
# jitter di pose detection (HRNet stima ogni frame indipendentemente -> i
# giunti "tremano" e a volte sputano outlier). Il filtro:
#   - agisce SOLO su (x,y), la confidence resta intatta;
#   - e' applicato PRIMA della normalizzazione, sui pixel;
#   - e' NaN-safe (i frame senza posa non inquinano la media);
#   - e' CENTRATO (non causale) -> nessun lag netto.
#
# Metodo di default 'median_gaussian' (a 2 stadi):
#   1. mediana mobile (smooth_median_window=3): uccide gli outlier/spike;
#   2. media gaussiana (smooth_window=5): liscia il jitter fine con meno lag
#      di una media piatta.
# Nei test e' quello che riduce di piu' il jitter E rimuove gli outlier.
#
# Alternative (streams.pose.smooth):
#   sma             -> media mobile semplice (peggiore con gli outlier)
#   gaussian        -> media pesata gaussiana
#   median          -> solo mediana mobile
#   median_gaussian -> mediana + gaussiana [DEFAULT consigliato]
#   none            -> nessun filtro (baseline)
#
# ATTENZIONE: un filtro troppo aggressivo (finestre grandi) smussa gli
# istanti in cui il pedone CAMBIA movimento (si ferma, muove il piede verso
# la strada), che sono il segnale utile per l'attraversamento. Tieni le
# finestre piccole (3-5) e confronta sempre col baseline (smooth=none).
#
# Differenza vs baseline: streams.pose.smooth = median_gaussian
# =============================================================

experiment:
  name: pedgt_pie_ablation8_smooth_keypoints
  seed: 42

data:
  annotation_root: /Users/robertodioguardi/Desktop/PIE
  obs_len: 16
  overlap: 0.6
  overlap_eval: 0.6
  anchor_eval: true
  endpoint_step: 6
  pose_dir: data/poses
  crop_dir: data/crops
  pose_norm: hip_reference_seq

model:
  name: PedGT
  in_channels: 5
  d_model: 128
  gcn_hidden: 64
  spatial_out: 64
  n_heads: 4
  n_layers: 2
  dim_feedforward: 256
  dropout: 0.7
  encoder_dropout: 0.1
  causal: false

streams:
  pose:
    enabled: true
    use_center_channels: true
    smooth: median_gaussian     # <<< PROVA 8: filtro anti-jitter sui keypoint
    smooth_window: 5            # finestra della media gaussiana
    smooth_median_window: 3     # finestra della mediana (pre-filtro outlier)
    encoder: gcn
    input_proj: [16]
    input_proj_dropout: 0.0

  kinematics:
    enabled: true
    bbox_format: xyxy
    hidden: 128

  crop:
    enabled: false
    in_dim: 768
    hidden: 128

  fusion: cross_attention

training:
  epochs: 100
  batch_size: 64
  lr: 1.0e-5
  weight_decay: 5.0e-5
  patience: 20
  grad_clip: 3.5
  scheduler: cosine
  plateau_factor: 0.5
  plateau_patience: 5

output:
  checkpoint_dir: checkpoints
  log_dir: logs
